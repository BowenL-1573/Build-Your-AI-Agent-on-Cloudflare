#:schema node_modules/wrangler/config-schema.json
name = "cf-agent"
main = "src/index.ts"
compatibility_date = "2025-02-26"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "AgentSession", class_name = "AgentSession" },
  { name = "Sandbox", class_name = "Sandbox" }
]

[[containers]]
class_name = "Sandbox"
name = "cf-agent-sandbox"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 10

[[workflows]]
name = "agent-task-workflow"
binding = "AGENT_TASK_WORKFLOW"
class_name = "AgentTaskWorkflow"

[[migrations]]
tag = "v1"
new_classes = ["AgentSession"]

[[migrations]]
tag = "v2"
deleted_classes = ["AgentSession"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["AgentSession"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["Sandbox"]

[vars]
SANDBOX_TRANSPORT = "websocket"
SANDBOX_URL = "http://sandbox.agents.cloudc.top:9090"
AI_GATEWAY_BASE = "https://gateway.ai.cloudflare.com/v1/<ACCOUNT_ID>/<GATEWAY_NAME>/compat"
AI_MODEL = "workers-ai/@cf/zai-org/glm-4.7-flash"

[[d1_databases]]
binding = "DB"
database_name = "agent-user-db"
database_id = "<YOUR_D1_DATABASE_ID>"

[[r2_buckets]]
binding = "R2"
bucket_name = "<YOUR_R2_BUCKET_NAME>"

# CF_AIG_TOKEN 通过 wrangler secret 设置
# SERPER_API_KEY 通过 wrangler secret 设置
# JINA_API_KEY 通过 wrangler secret 设置
